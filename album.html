<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Fotos ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg,#ff4d6d,#ff8fab);
            overflow-x: hidden;
            color: white;
            text-align: center;
            position: relative;
        }

        /* Título */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            margin: 40px 0;
        }

        /* Galería */
        .gallery-section {
            margin: 50px 20px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .photo-box {
            width: 220px;
            height: 220px;
            overflow: hidden;
            border-radius: 25px;
            border: 5px solid white;
            cursor: pointer;
            transition: transform 0.5s;
        }

            .photo-box img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.5s, opacity 0.5s;
                opacity: 0;
                transform: translateY(50px) scale(0.8);
            }

                .photo-box img.animar {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }

            .photo-box:hover img {
                transform: scale(1.15) rotate(2deg);
            }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 5000;
            flex-direction: column;
            touch-action: pan-y;
        }

            #lightbox img {
                max-width: 90%;
                max-height: 80%;
                border-radius: 20px;
                box-shadow: 0 0 50px rgba(0,0,0,0.5);
                transition: transform 0.5s ease;
            }

            #lightbox .cerrar, #lightbox .prev, #lightbox .next {
                position: absolute;
                color: #ffd700;
                font-size: 40px;
                font-weight: bold;
                cursor: pointer;
                user-select: none;
                transition: 0.3s;
            }

            #lightbox .cerrar {
                top: 20px;
                right: 30px;
            }

            #lightbox .prev {
                top: 50%;
                left: 30px;
                transform: translateY(-50%);
            }

            #lightbox .next {
                top: 50%;
                right: 30px;
                transform: translateY(-50%);
            }

                #lightbox .cerrar:hover, #lightbox .prev:hover, #lightbox .next:hover {
                    color: #ff2e63;
                }

        /* Contador de fotos */
        #contadorLightbox {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 20px;
        }

        /* Corazones y brillos */
        .corazon-lluvia {
            position: fixed;
            top: -20px;
            font-size: 35px;
            color: red;
            animation: caer linear forwards;
            pointer-events: none;
        }

        @keyframes caer {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        .brillo {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            opacity: 0.8;
            pointer-events: none;
            animation: brillar 2s infinite;
        }

        @keyframes brillar {
            0%,100% {
                opacity: 0.2;
                transform: scale(0.5);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Responsive */
        @media(max-width:500px) {
            h1 {
                font-size: 2.5rem;
            }

            .photo-box {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>

    <h1><span class="corazon">❤️</span> Nuestro Álbum de Recuerdos <span class="corazon">❤️</span></h1>

    <div class="gallery-section">
        <div class="photo-box"><img src="foto1.jpg"></div>
        <div class="photo-box"><img src="foto2.jpg"></div>
        <div class="photo-box"><img src="foto3.jpg"></div>
        <div class="photo-box"><img src="foto4.jpg"></div>
        <div class="photo-box"><img src="foto5.jpg"></div>
        <div class="photo-box"><img src="foto6.jpg"></div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <span class="cerrar" onclick="cerrarLightbox()">&times;</span>
        <span class="prev" onclick="cambiarFoto(-1)">&#10094;</span>
        <img src="">
        <span class="next" onclick="cambiarFoto(1)">&#10095;</span>
        <div id="contadorLightbox">1 / 6</div>
    </div>

    <script>
        // Animación fotos al cargar
        function animarFotos() {
            const fotos = document.querySelectorAll(".photo-box img");
            fotos.forEach((img, i) => { setTimeout(() => { img.classList.add("animar"); }, i * 200); });
        }
        animarFotos();

        // Corazones caen
        function lluviaDeCorazones() {
            const cor = document.createElement("div");
            cor.className = "corazon-lluvia";
            cor.innerHTML = "💖";
            cor.style.left = Math.random() * 100 + "vw";
            cor.style.fontSize = (Math.random() * 30 + 20) + "px";
            cor.style.animationDuration = (Math.random() * 2 + 2) + "s";
            document.body.appendChild(cor);
            setTimeout(() => cor.remove(), 5000);
        }
        setInterval(lluviaDeCorazones, 300);

        // Brillos románticos
        function brillosRomanticos() {
            for (let i = 0; i < 50; i++) {
                const brillo = document.createElement("div");
                brillo.className = "brillo";
                brillo.style.top = Math.random() * 100 + "vh";
                brillo.style.left = Math.random() * 100 + "vw";
                brillo.style.width = (Math.random() * 5 + 3) + "px";
                brillo.style.height = (Math.random() * 5 + 3) + "px";
                document.body.appendChild(brillo);
            }
        }
        brillosRomanticos();

        // Lightbox / Carrusel avanzado
        let currentIndex = 0;
        const fotos = document.querySelectorAll(".photo-box img");
        const lightbox = document.getElementById("lightbox");
        const lbImg = lightbox.querySelector("img");
        const contador = document.getElementById("contadorLightbox");

        fotos.forEach((img, i) => {
            img.addEventListener("click", () => {
                currentIndex = i;
                mostrarFoto();
                lightbox.style.display = "flex";
            });
        });

        function mostrarFoto() {
            lbImg.src = fotos[currentIndex].src;
            contador.textContent = `${currentIndex + 1} / ${fotos.length}`;
            lbImg.style.transform = "scale(0.9)";
            setTimeout(() => { lbImg.style.transform = "scale(1)"; }, 50);
        }

        function cerrarLightbox() { lightbox.style.display = "none"; }

        function cambiarFoto(dir) {
            currentIndex += dir;
            if (currentIndex < 0) currentIndex = fotos.length - 1;
            if (currentIndex >= fotos.length) currentIndex = 0;
            mostrarFoto();
        }

        // Swipe móvil
        let startX = 0;
        lbImg.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; });
        lbImg.addEventListener("touchend", (e) => {
            const endX = e.changedTouches[0].clientX;
            if (endX - startX > 50) cambiarFoto(-1);
            if (startX - endX > 50) cambiarFoto(1);
        });
    </script>

</body>
</html>
